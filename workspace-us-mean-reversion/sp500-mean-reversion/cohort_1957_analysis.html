<script>
const CHECKPOINTS = [1957,1962,1967,1972,1977,1982,1987,1992,1997,2002,2007,2012,2017,2022];
const STAGE_LABELS = {1:'Growth',2:'Mature',3:'Deceleration',4:'Death'};
const STAGE_SHORT = {1:'Growth',2:'Mature',3:'Decel',4:'Death'};

let currentSeed = 42;
let currentYear = 1957;
let currentData = null;
let sortCol = null;
let sortAsc = true;

function getData(seed) {
  if (seed === 42) return DATA_42;
  if (seed === 123) return DATA_123;
  return DATA_7;
}

function pct(v, d=1) { return v == null ? '—' : (v * 100).toFixed(d) + '%'; }
function fmt(v, d=0) { return v == null ? '—' : v.toLocaleString('en-US', {maximumFractionDigits: d}); }

// Build year buttons once
(function initYearBar() {
  const bar = document.getElementById('yearBar');
  CHECKPOINTS.forEach(yr => {
    const b = document.createElement('button');
    b.className = 'pill yr' + (yr === 1957 ? ' active' : '');
    b.textContent = yr;
    b.id = 'yr' + yr;
    b.onclick = () => switchYear(yr);
    bar.appendChild(b);
  });
})();

function switchSeed(seed) {
  currentSeed = seed;
  currentData = getData(seed);
  document.querySelectorAll('.top-bar .bar-group:first-of-type .pill').forEach(b =>
    b.classList.toggle('active', b.id === 'sb' + seed));
  render();
}

function switchYear(yr) {
  currentYear = yr;
  CHECKPOINTS.forEach(y => document.getElementById('yr'+y).classList.toggle('active', y === yr));
  render();
}

// Compute snapshot at a given year
function snapshot(data, yr) {
  const ym = yr + '-06';
  const companies = data.portfolio.companies;
  const nameMap = {};
  companies.forEach(c => { nameMap[c.permno] = c.name; });

  // Active companies at checkpoint
  const active = companies.filter(c => {
    const exit = c.exit || '2025-01';
    return c.entry <= ym && ym <= exit;
  });

  // Replacements in the window [prevCheckpoint, yr]
  const prevYr = CHECKPOINTS[Math.max(0, CHECKPOINTS.indexOf(yr) - 1)];
  const prevYm = prevYr === yr ? '1957-01' : prevYr + '-07';
  const reps = data.portfolio.replacements.filter(r => r.ym > prevYm && r.ym <= ym);

  // Lifecycle window matching: for each active company, find the best matching window
  const windows = data.module_1_lifecycle.per_company_windows;
  const decomp = {};
  data.module_5_mktcap_decomposition.companies.forEach(c => { decomp[c.permno] = c; });

  const rows = active.map(c => {
    const entryYr = parseInt(c.entry.split('-')[0]);
    const exitYr = c.exit ? parseInt(c.exit.split('-')[0]) : 2024;
    const yearsHeld = yr - entryYr;
    const isOriginal = c.entry === '1957-03';

    // Find best lifecycle window containing yr
    let bestWindow = null;
    if (windows[c.permno]) {
      const matching = windows[c.permno].filter(w => {
        const [ws, we] = w.window.split('-').map(Number);
        return ws <= yr && yr <= we;
      });
      if (matching.length > 0) {
        bestWindow = matching[matching.length - 1]; // latest start
      } else {
        // fallback: closest window
        const all = windows[c.permno];
        let minDist = Infinity;
        all.forEach(w => {
          const [ws, we] = w.window.split('-').map(Number);
          const mid = (ws + we) / 2;
          const dist = Math.abs(mid - yr);
          if (dist < minDist) { minDist = dist; bestWindow = w; }
        });
      }
    }

    const d = decomp[c.permno];

    return {
      permno: c.permno,
      name: c.name,
      industry: c.industry || '其他',
      entry: c.entry,
      exit: c.exit || '至今',
      exitRaw: c.exit,
      yearsHeld,
      isOriginal,
      stage: bestWindow ? bestWindow.stage : null,
      epsCagr: bestWindow ? bestWindow.eps_cagr : null,
      avgPe: bestWindow ? bestWindow.avg_pe : null,
      windowLabel: bestWindow ? bestWindow.window : null,
      mktcap: c.mktcap_by_year ? c.mktcap_by_year[String(yr)] || null : null,
      // decomposition (full period)
      fullEpsCagr: d ? d.eps_cagr : null,
      fullPeCagr: d ? d.pe_cagr : null,
      fullSharesCagr: d ? d.shares_cagr : null,
      fullMktcapCagr: d ? d.mktcap_cagr : null,
      fullPeriod: d ? d.period : null,
    };
  });

  // Median PE for this year
  const medianPe = data.module_2_pe_trajectories.median_pe_by_year[String(yr)] || null;

  // Compute aggregates
  const nOriginal = rows.filter(r => r.isOriginal).length;
  const stages = {};
  rows.forEach(r => {
    const s = r.stage || 'NA';
    stages[s] = (stages[s] || 0) + 1;
  });
  const avgYearsHeld = rows.reduce((s, r) => s + r.yearsHeld, 0) / rows.length;
  const validEps = rows.filter(r => r.epsCagr != null);
  const avgEpsCagr = validEps.length ? validEps.reduce((s, r) => s + r.epsCagr, 0) / validEps.length : null;
  const validPe = rows.filter(r => r.avgPe != null);
  const avgPe = validPe.length ? validPe.reduce((s, r) => s + r.avgPe, 0) / validPe.length : null;

  // Industry aggregates
  const totalMktcap = rows.reduce((s, r) => s + (r.mktcap || 0), 0);
  const industryMktcap = {};
  const industryCounts = {};
  rows.forEach(r => {
    const ind = r.industry;
    industryMktcap[ind] = (industryMktcap[ind] || 0) + (r.mktcap || 0);
    industryCounts[ind] = (industryCounts[ind] || 0) + 1;
  });

  return { rows, reps, nameMap, medianPe, nOriginal, stages, avgYearsHeld, avgEpsCagr, avgPe, yr, totalMktcap, industryMktcap, industryCounts };
}

function render() {
  const snap = snapshot(currentData, currentYear);

  // Summary strip
  const ss = document.getElementById('summaryStrip');
  ss.innerHTML = `
    <div class="stat"><div class="k">截面年份</div><div class="v blue">${snap.yr}</div></div>
    <div class="stat"><div class="k">持仓数</div><div class="v blue">${snap.rows.length}</div></div>
    <div class="stat"><div class="k">1957原始成员</div><div class="v cyan">${snap.nOriginal}</div></div>
    <div class="stat"><div class="k">替补进入</div><div class="v orange">${snap.rows.length - snap.nOriginal}</div></div>
    <div class="stat"><div class="k">中位PE</div><div class="v purple">${snap.medianPe ? snap.medianPe.toFixed(1) : '—'}</div></div>
    <div class="stat"><div class="k">均值PE (窗口)</div><div class="v purple">${snap.avgPe ? snap.avgPe.toFixed(1) : '—'}</div></div>
    <div class="stat"><div class="k">均值EPS CAGR</div><div class="v green">${pct(snap.avgEpsCagr)}</div></div>
    <div class="stat"><div class="k">平均持有年数</div><div class="v blue">${snap.avgYearsHeld.toFixed(1)}</div></div>
    ${Object.entries(snap.stages).sort((a,b) => {
      const order = {'1':0,'2':1,'3':2,'4':3,'NA':4};
      return (order[a[0]]||9) - (order[b[0]]||9);
    }).map(([s, n]) => {
      const label = STAGE_SHORT[s] || 'N/A';
      const cls = s==='1'?'green':s==='2'?'blue':s==='3'?'orange':s==='4'?'red':'';
      return `<div class="stat"><div class="k">${label}</div><div class="v ${cls}">${n}</div></div>`;
    }).join('')}
    <div class="stat"><div class="k">组合总市值</div><div class="v green">${snap.totalMktcap >= 1e6 ? (snap.totalMktcap/1e6).toFixed(2)+'万亿' : snap.totalMktcap >= 1000 ? (snap.totalMktcap/1000).toFixed(1)+'B' : snap.totalMktcap.toFixed(0)+'M'}</div></div>
  `;

  // Replacements
  const prevYrIdx = Math.max(0, CHECKPOINTS.indexOf(currentYear) - 1);
  const prevYr = CHECKPOINTS[prevYrIdx];
  const repTitle = currentYear === 1957
    ? '初始建仓 (1957-03)'
    : `${prevYr} → ${currentYear} 期间替补 (${snap.reps.length} 次)`;
  document.getElementById('repTitle').textContent = repTitle;

  const repBody = document.getElementById('repBody');
  if (currentYear === 1957) {
    repBody.innerHTML = '<div class="no-rep">初始随机抽取50家公司建仓</div>';
  } else if (snap.reps.length === 0) {
    repBody.innerHTML = '<div class="no-rep">此期间无替补事件</div>';
  } else {
    repBody.innerHTML = snap.reps.map(r => `
      <div class="rep-row">
        <span class="date">${r.ym}</span>
        <span class="out">${snap.nameMap[r.exited] || r.exited}</span>
        <span class="arrow">→</span>
        <span class="in">${snap.nameMap[r.entered] || r.entered}</span>
      </div>
    `).join('');
  }

  // Main table
  document.getElementById('tableTitle').textContent =
    `${currentYear} 年截面：${snap.rows.length} 家公司详情`;

  renderTable(snap.rows);
}

function renderTable(rows) {
  const cols = [
    { key: 'name', label: '公司名', align: 'left', fmt: v => v },
    { key: 'industry', label: '行业', align: 'left', fmt: v => v },
    { key: 'mktcap', label: '市值($M)', align: 'right', fmt: v => v != null ? (v >= 1000 ? (v/1000).toFixed(1)+'B' : v.toFixed(0)) : '—' },
    { key: 'permno', label: 'PERMNO', align: 'left', fmt: v => v },
    { key: 'entry', label: '入选', align: 'right', fmt: v => v },
    { key: 'exit', label: '退出', align: 'right', fmt: v => v },
    { key: 'yearsHeld', label: '已持有', align: 'right', fmt: v => v + '年' },
    { key: 'stage', label: '阶段', align: 'right', fmt: v => {
      if (v == null) return '<span class="stage stage-na">N/A</span>';
      return `<span class="stage stage-${v}">${STAGE_SHORT[v] || v}</span>`;
    }},
    { key: 'windowLabel', label: '窗口', align: 'right', fmt: v => v || '—' },
    { key: 'epsCagr', label: 'EPS CAGR', align: 'right', fmt: v => pct(v) },
    { key: 'avgPe', label: 'Avg PE', align: 'right', fmt: v => v != null ? v.toFixed(1) : '—' },
    { key: 'fullPeriod', label: '分解期', align: 'right', fmt: v => v || '—' },
    { key: 'fullEpsCagr', label: 'EPS(全)', align: 'right', fmt: v => pct(v) },
    { key: 'fullPeCagr', label: 'PE(全)', align: 'right', fmt: v => pct(v) },
    { key: 'fullSharesCagr', label: '股本(全)', align: 'right', fmt: v => pct(v) },
    { key: 'fullMktcapCagr', label: 'MktCap(全)', align: 'right', fmt: v => pct(v) },
  ];

  // Sort
  let sorted = [...rows];
  if (sortCol != null) {
    sorted.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va == null && vb == null) return 0;
      if (va == null) return 1;
      if (vb == null) return -1;
      if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortAsc ? va - vb : vb - va;
    });
  }

  const thead = '<thead><tr>' + cols.map(c => {
    const arrow = sortCol === c.key ? (sortAsc ? ' ↑' : ' ↓') : '';
    return `<th data-col="${c.key}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('') + '</tr></thead>';

  const tbody = '<tbody>' + sorted.map(r => {
    const cls = r.isOriginal ? 'original' : 'replacement';
    return '<tr class="' + cls + '">' + cols.map(c => {
      const raw = r[c.key];
      const display = c.fmt(raw);
      const numCls = (c.key.includes('Cagr') || c.key === 'epsCagr') && raw != null
        ? (raw > 0 ? ' class="green"' : raw < 0 ? ' class="red"' : '')
        : '';
      return `<td${numCls}>${display}</td>`;
    }).join('') + '</tr>';
  }).join('') + '</tbody>';

  document.getElementById('mainTable').innerHTML = thead + tbody;

  // Attach sort handlers
  document.querySelectorAll('#mainTable th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) { sortAsc = !sortAsc; }
      else { sortCol = col; sortAsc = true; }
      renderTable(rows);
    });
  });
}

// ---- Trend charts ----
const trendCharts = {};
const TREND_GRID = 'rgba(255,255,255,0.06)';
const TREND_TICK = '#4a5568';

function trendChartOpts(title, yLabel, extra) {
  return Object.assign({
    responsive: true, maintainAspectRatio: false,
    plugins: {
      title: { display: true, text: title, color: '#8896a8', font: { size: 12 } },
      legend: { display: false },
    },
    scales: {
      x: { ticks: { color: TREND_TICK, font: { size: 10 }, maxRotation: 45 }, grid: { color: TREND_GRID } },
      y: { title: { display: true, text: yLabel, color: TREND_TICK, font: { size: 10 } },
           ticks: { color: TREND_TICK, font: { size: 10 } }, grid: { color: TREND_GRID } },
    },
  }, extra || {});
}

function makeTrend(id, config) {
  if (trendCharts[id]) trendCharts[id].destroy();
  trendCharts[id] = new Chart(document.getElementById(id).getContext('2d'), config);
}

function renderTrendCharts() {
  // Compute all snapshots
  const snaps = CHECKPOINTS.map(yr => snapshot(currentData, yr));
  const labels = CHECKPOINTS.map(String);
  const curIdx = CHECKPOINTS.indexOf(currentYear);

  // Highlight dot for current year
  function pointRadius(i) { return i === curIdx ? 6 : 3; }
  function pointBg(baseColor) {
    return CHECKPOINTS.map((_, i) => i === curIdx ? '#ffffff' : baseColor);
  }
  function pointBorder(baseColor) {
    return CHECKPOINTS.map((_, i) => i === curIdx ? baseColor : baseColor);
  }

  // Highlight helpers for bar charts — selected year gets full color, others dimmed
  function barBg(baseColor) {
    const dim = baseColor + '66'; // 40% opacity
    return CHECKPOINTS.map((_, i) => i === curIdx ? baseColor : dim);
  }
  function barBorder(baseColor) {
    return CHECKPOINTS.map((_, i) => i === curIdx ? '#ffffff' : 'transparent');
  }

  // 1. Original vs Replacement members
  const nOrig = snaps.map(s => s.nOriginal);
  const nRep = snaps.map(s => s.rows.length - s.nOriginal);
  makeTrend('trendOriginal', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '1957原始', data: nOrig, backgroundColor: barBg('#60a5fa'), borderColor: barBorder('#60a5fa'), borderWidth: CHECKPOINTS.map((_, i) => i === curIdx ? 2 : 0), borderRadius: 2, order: 2 },
        { label: '替补', data: nRep, backgroundColor: barBg('#fbbf24'), borderColor: barBorder('#fbbf24'), borderWidth: CHECKPOINTS.map((_, i) => i === curIdx ? 2 : 0), borderRadius: 2, order: 2 },
      ]
    },
    options: Object.assign(trendChartOpts('组合构成: 原始 vs 替补', '公司数'), {
      plugins: {
        title: { display: true, text: '组合构成: 原始 vs 替补', color: '#8896a8', font: { size: 12 } },
        legend: { display: true, labels: { color: '#6b7a8d', font: { size: 10 }, boxWidth: 12 } },
      },
      scales: {
        x: { stacked: true, ticks: { color: TREND_TICK, font: { size: 10 }, maxRotation: 45 }, grid: { color: TREND_GRID } },
        y: { stacked: true, title: { display: true, text: '公司数', color: TREND_TICK, font: { size: 10 } },
             ticks: { color: TREND_TICK, font: { size: 10 } }, grid: { color: TREND_GRID } },
      }
    })
  });

  // 2. PE: median PE + avg PE
  const medPE = snaps.map(s => s.medianPe);
  const avgPE = snaps.map(s => s.avgPe);
  makeTrend('trendPE', {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '中位PE', data: medPE, borderColor: '#a78bfa', backgroundColor: '#a78bfa20',
          fill: true, pointRadius: CHECKPOINTS.map((_, i) => pointRadius(i)),
          pointBackgroundColor: pointBg('#a78bfa'), tension: 0.3 },
        { label: '均值PE(窗口)', data: avgPE, borderColor: '#f472b6', borderDash: [4, 3],
          pointRadius: CHECKPOINTS.map((_, i) => pointRadius(i)),
          pointBackgroundColor: pointBg('#f472b6'), tension: 0.3 },
      ]
    },
    options: Object.assign(trendChartOpts('PE估值', 'PE'), {
      plugins: {
        title: { display: true, text: 'PE 估值', color: '#8896a8', font: { size: 12 } },
        legend: { display: true, labels: { color: '#6b7a8d', font: { size: 10 }, boxWidth: 12 } },
      }
    })
  });

  // 3. EPS CAGR + avg years held (dual axis)
  const epsArr = snaps.map(s => s.avgEpsCagr != null ? s.avgEpsCagr * 100 : null);
  const yrsArr = snaps.map(s => s.avgYearsHeld);
  makeTrend('trendEPS', {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '均值EPS CAGR (%)', data: epsArr, borderColor: '#34d399',
          pointRadius: CHECKPOINTS.map((_, i) => pointRadius(i)),
          pointBackgroundColor: pointBg('#34d399'), tension: 0.3, yAxisID: 'y' },
        { label: '平均持有年数', data: yrsArr, borderColor: '#60a5fa', borderDash: [4, 3],
          pointRadius: CHECKPOINTS.map((_, i) => pointRadius(i)),
          pointBackgroundColor: pointBg('#60a5fa'), tension: 0.3, yAxisID: 'y1' },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        title: { display: true, text: 'EPS增长 & 持有年数', color: '#8896a8', font: { size: 12 } },
        legend: { display: true, labels: { color: '#6b7a8d', font: { size: 10 }, boxWidth: 12 } },
      },
      scales: {
        x: { ticks: { color: TREND_TICK, font: { size: 10 }, maxRotation: 45 }, grid: { color: TREND_GRID } },
        y: { position: 'left', title: { display: true, text: 'EPS CAGR (%)', color: '#34d399', font: { size: 10 } },
             ticks: { color: '#34d399', font: { size: 10 }, callback: v => v.toFixed(1) + '%' }, grid: { color: TREND_GRID } },
        y1: { position: 'right', title: { display: true, text: '年数', color: '#60a5fa', font: { size: 10 } },
              ticks: { color: '#60a5fa', font: { size: 10 } }, grid: { drawOnChartArea: false } },
      }
    }
  });

  // 4. Stage distribution stacked bar
  const stageData = { 1: [], 2: [], 3: [], 4: [], NA: [] };
  snaps.forEach(s => {
    stageData[1].push(s.stages[1] || 0);
    stageData[2].push(s.stages[2] || 0);
    stageData[3].push(s.stages[3] || 0);
    stageData[4].push(s.stages[4] || 0);
    stageData['NA'].push(s.stages['NA'] || 0);
  });
  makeTrend('trendStages', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Growth', data: stageData[1], backgroundColor: barBg('#34d399'), borderColor: barBorder('#34d399'), borderWidth: CHECKPOINTS.map((_, i) => i === curIdx ? 2 : 0) },
        { label: 'Mature', data: stageData[2], backgroundColor: barBg('#60a5fa'), borderColor: barBorder('#60a5fa'), borderWidth: CHECKPOINTS.map((_, i) => i === curIdx ? 2 : 0) },
        { label: 'Decel', data: stageData[3], backgroundColor: barBg('#fbbf24'), borderColor: barBorder('#fbbf24'), borderWidth: CHECKPOINTS.map((_, i) => i === curIdx ? 2 : 0) },
        { label: 'Death', data: stageData[4], backgroundColor: barBg('#f87171'), borderColor: barBorder('#f87171'), borderWidth: CHECKPOINTS.map((_, i) => i === curIdx ? 2 : 0) },
        { label: 'N/A', data: stageData['NA'], backgroundColor: barBg('#3a4352'), borderColor: barBorder('#3a4352'), borderWidth: CHECKPOINTS.map((_, i) => i === curIdx ? 2 : 0) },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        title: { display: true, text: '生命周期阶段分布', color: '#8896a8', font: { size: 12 } },
        legend: { display: true, labels: { color: '#6b7a8d', font: { size: 10 }, boxWidth: 12 } },
      },
      scales: {
        x: { stacked: true, ticks: { color: TREND_TICK, font: { size: 10 }, maxRotation: 45 }, grid: { color: TREND_GRID } },
        y: { stacked: true, title: { display: true, text: '公司数', color: TREND_TICK, font: { size: 10 } },
             ticks: { color: TREND_TICK, font: { size: 10 } }, grid: { color: TREND_GRID } },
      }
    }
  });

  // 5. Industry weight (% of market cap) stacked bar
  // Collect all industries across all snapshots, sort by total mktcap
  const allIndustries = {};
  snaps.forEach(s => {
    for (const [ind, mc] of Object.entries(s.industryMktcap)) {
      allIndustries[ind] = (allIndustries[ind] || 0) + mc;
    }
  });
  const sortedInds = Object.entries(allIndustries).sort((a, b) => b[1] - a[1]).map(e => e[0]);
  // Keep top 8, group rest as '其他'
  const TOP_N = 8;
  const topInds = sortedInds.slice(0, TOP_N);
  const IND_COLORS = ['#60a5fa', '#f472b6', '#34d399', '#fbbf24', '#a78bfa', '#f87171', '#38bdf8', '#fb923c', '#818cf8', '#4ade80'];

  // Compute weight% per industry per checkpoint
  const indWeightData = {};
  topInds.forEach(ind => { indWeightData[ind] = []; });
  indWeightData['其他行业'] = [];
  snaps.forEach(s => {
    const total = s.totalMktcap || 1;
    topInds.forEach(ind => {
      indWeightData[ind].push(((s.industryMktcap[ind] || 0) / total * 100));
    });
    const otherMc = Object.entries(s.industryMktcap)
      .filter(([k]) => !topInds.includes(k))
      .reduce((sum, [, v]) => sum + v, 0);
    indWeightData['其他行业'].push(otherMc / total * 100);
  });

  const indWeightDatasets = topInds.map((ind, i) => ({
    label: ind,
    data: indWeightData[ind],
    backgroundColor: barBg(IND_COLORS[i % IND_COLORS.length]),
    borderColor: barBorder(IND_COLORS[i % IND_COLORS.length]),
    borderWidth: CHECKPOINTS.map((_, j) => j === curIdx ? 2 : 0),
  }));
  indWeightDatasets.push({
    label: '其他行业',
    data: indWeightData['其他行业'],
    backgroundColor: barBg('#3a4352'),
    borderColor: barBorder('#3a4352'),
    borderWidth: CHECKPOINTS.map((_, j) => j === curIdx ? 2 : 0),
  });

  makeTrend('trendIndustryWeight', {
    type: 'bar',
    data: { labels, datasets: indWeightDatasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        title: { display: true, text: '行业市值权重 (%)', color: '#8896a8', font: { size: 12 } },
        legend: { display: true, labels: { color: '#6b7a8d', font: { size: 9 }, boxWidth: 10 }, position: 'right' },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw.toFixed(1)}%` } },
      },
      scales: {
        x: { stacked: true, ticks: { color: TREND_TICK, font: { size: 10 }, maxRotation: 45 }, grid: { color: TREND_GRID } },
        y: { stacked: true, max: 100, title: { display: true, text: '%', color: TREND_TICK, font: { size: 10 } },
             ticks: { color: TREND_TICK, font: { size: 10 }, callback: v => v + '%' }, grid: { color: TREND_GRID } },
      }
    }
  });

  // 6. Industry market cap (absolute $M) stacked bar + total line
  const indMcData = {};
  topInds.forEach(ind => { indMcData[ind] = []; });
  indMcData['其他行业'] = [];
  snaps.forEach(s => {
    topInds.forEach(ind => {
      indMcData[ind].push((s.industryMktcap[ind] || 0) / 1000); // in $B
    });
    const otherMc = Object.entries(s.industryMktcap)
      .filter(([k]) => !topInds.includes(k))
      .reduce((sum, [, v]) => sum + v, 0);
    indMcData['其他行业'].push(otherMc / 1000);
  });

  const indMcDatasets = topInds.map((ind, i) => ({
    label: ind,
    data: indMcData[ind],
    backgroundColor: barBg(IND_COLORS[i % IND_COLORS.length]),
    borderColor: barBorder(IND_COLORS[i % IND_COLORS.length]),
    borderWidth: CHECKPOINTS.map((_, j) => j === curIdx ? 2 : 0),
  }));
  indMcDatasets.push({
    label: '其他行业',
    data: indMcData['其他行业'],
    backgroundColor: barBg('#3a4352'),
    borderColor: barBorder('#3a4352'),
    borderWidth: CHECKPOINTS.map((_, j) => j === curIdx ? 2 : 0),
  });

  makeTrend('trendIndustryMktcap', {
    type: 'bar',
    data: { labels, datasets: indMcDatasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        title: { display: true, text: '行业市值 ($B)', color: '#8896a8', font: { size: 12 } },
        legend: { display: true, labels: { color: '#6b7a8d', font: { size: 9 }, boxWidth: 10 }, position: 'right' },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: $${ctx.raw.toFixed(1)}B` } },
      },
      scales: {
        x: { stacked: true, ticks: { color: TREND_TICK, font: { size: 10 }, maxRotation: 45 }, grid: { color: TREND_GRID } },
        y: { stacked: true, title: { display: true, text: '$B', color: TREND_TICK, font: { size: 10 } },
             ticks: { color: TREND_TICK, font: { size: 10 } }, grid: { color: TREND_GRID } },
      }
    }
  });
}

// ---- Modify render to include trend charts ----
const _origRender = render;

// Init
currentData = DATA_42;
render();
renderTrendCharts();

// Patch switchSeed / switchYear to also refresh trend charts
const _origSwitchSeed = switchSeed;
switchSeed = function(seed) { _origSwitchSeed(seed); renderTrendCharts(); };
const _origSwitchYear = switchYear;
switchYear = function(yr) { _origSwitchYear(yr); renderTrendCharts(); };
</script>
