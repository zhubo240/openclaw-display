<title>社交媒体时间线</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;

    --wechat: #07c160; --xhs: #fe2c55; --bili: #00a1d6; --yt: #ff0000;
    --line: #30363d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 32px 20px;
  }
  .container { max-width: 860px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 36px; }
  header h1 { font-size: 24px; margin-bottom: 4px; }
  header .sub { color: var(--text2); font-size: 13px; }

  .filters {
    display: flex; justify-content: center; gap: 8px;
    margin-bottom: 32px; flex-wrap: wrap;
  }
  .filter-btn {
    appearance: none; background: var(--card); color: var(--text2);
    border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px;
    font-size: 13px; cursor: pointer; font-weight: 500;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .filter-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .timeline { position: relative; padding-left: 32px; }
  .timeline::before {
    content: ''; position: absolute; left: 11px; top: 0; bottom: 0;
    width: 2px; background: var(--line);
  }

  .date-node { position: relative; margin-bottom: 32px; }
  .date-node::before {
    content: ''; position: absolute; left: -32px; top: 6px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg); z-index: 1;
  }
  .date-label {
    font-size: 14px; font-weight: 700; color: var(--accent);
    margin-bottom: 12px; letter-spacing: 0.5px;
    cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 6px;
  }
  .date-label:hover { opacity: 0.8; }
  .date-label .arrow { font-size: 12px; transition: transform 0.2s; display: inline-block; width: 14px; }
  .date-node.collapsed .arrow { transform: rotate(-90deg); }
  .date-node.collapsed .platform-group { display: none; }
  .date-label .weekday { color: var(--text2); font-weight: 400; margin-left: 8px; font-size: 12px; }
  .date-label .entry-count { color: var(--text2); font-weight: 400; font-size: 12px; margin-left: auto; }

  .platform-group {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 10px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .platform-group:hover { border-color: rgba(88,166,255,0.4); }
  .platform-header {
    display: flex; align-items: center; gap: 8px; padding: 10px 16px;
    cursor: pointer; user-select: none;
  }
  .platform-header .arrow { font-size: 12px; transition: transform 0.2s; display: inline-block; width: 14px; }
  .platform-group.collapsed .arrow { transform: rotate(-90deg); }
  .platform-group.collapsed .platform-content { display: none; }
  .platform-content { padding: 0 16px 12px; }
  .entry-platform {
    font-size: 12px; font-weight: 600; padding: 2px 10px;
    border-radius: 10px; white-space: nowrap;
  }
  .p-wechat { background: rgba(7,193,96,0.15); color: var(--wechat); }
  .p-xhs { background: rgba(254,44,85,0.15); color: var(--xhs); }
  .p-bili { background: rgba(0,161,214,0.15); color: var(--bili); }
  .p-yt { background: rgba(255,0,0,0.15); color: var(--yt); }

  /* Item cards */
  .item-card {
    display: flex; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .item-card:last-child { border-bottom: none; }
  .item-thumb {
    width: 120px; height: 80px; border-radius: 6px;
    object-fit: cover; flex-shrink: 0; background: var(--border);
  }
  .item-body { flex: 1; min-width: 0; }
  .item-title {
    font-size: 14px; font-weight: 600; line-height: 1.4;
    margin-bottom: 4px;
  }
  .item-title a { color: var(--text); text-decoration: none; }
  .item-title a:hover { color: var(--accent); }
  .item-meta {
    font-size: 12px; color: var(--text2); margin-bottom: 4px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .item-meta .source { color: var(--accent); }
  .item-summary {
    font-size: 12px; color: var(--text2); line-height: 1.6;
  }
  .item-summary.full-text {
    color: var(--text); font-size: 13px; white-space: pre-wrap;
  }

  /* Section headers inside platform */
  .section-title {
    font-size: 12px; color: var(--accent); font-weight: 600;
    margin: 12px 0 4px; padding-bottom: 4px;
    border-bottom: 1px solid rgba(88,166,255,0.15);
  }
  .section-title:first-child { margin-top: 4px; }

  /* Trends block */
  .trends {
    font-size: 12px; color: var(--text2); line-height: 1.7;
    padding: 8px 0; margin-top: 4px;
  }
  .trends strong { color: var(--text); }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--text2); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  @media (max-width: 600px) {
    .timeline { padding-left: 24px; }
    .date-node::before { left: -24px; }
    .timeline::before { left: 3px; }
    .item-thumb { width: 80px; height: 54px; }
  }
</style>

/* ===== CONFIG ===== */
const PLATFORMS = {
  wechat: { label: '微信', cls: 'p-wechat' },
  xhs:    { label: '小红书', cls: 'p-xhs' },
  bili:   { label: 'B站', cls: 'p-bili' },
  yt:     { label: 'YouTube', cls: 'p-yt' }
};
const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
let filter = 'all';

function esc(s) { return s ? s.replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', (btn.dataset.f || 'all') === f);
  });
  render();
}

function toggleDay(el) { el.closest('.date-node').classList.toggle('collapsed'); }
function togglePlatform(el) { el.closest('.platform-group').classList.toggle('collapsed'); }

function renderItem(item, type) {
  let html = '<div class="item-card">';

  // Thumbnail
  const img = item.image;
  if (img) {
    const thumbUrl = item.summaryUrl || item.url || '#';
    html += `<a href="${esc(thumbUrl)}" target="_blank"><img class="item-thumb" src="${esc(img)}" loading="lazy" onerror="this.style.display='none'"></a>`;
  }

  html += '<div class="item-body">';

  // Title — prefer summaryUrl (detailed summary page), fallback to url (original)
  const titleUrl = item.summaryUrl || item.url;
  if (titleUrl) {
    html += `<div class="item-title"><a href="${esc(titleUrl)}" target="_blank">${esc(item.title)}</a></div>`;
  } else {
    html += `<div class="item-title">${esc(item.title)}</div>`;
  }

  // Meta line
  const meta = [];
  if (item.source) meta.push(`<span class="source">${esc(item.source)}</span>`);
  if (item.channel) meta.push(esc(item.channel));
  if (item.handle) meta.push(esc(item.handle));
  if (item.up) meta.push(esc(item.up));
  if (item.author) meta.push(esc(item.author));
  if (item.views) meta.push(esc(item.views) + (type === 'bili' ? '播放' : '次观看'));
  if (item.likes) meta.push(esc(item.likes) + '赞');
  if (item.time) meta.push(esc(item.time));
  if (item.summaryUrl && item.url && item.summaryUrl !== item.url) {
    meta.push(`<a href="${esc(item.url)}" target="_blank" style="color:var(--text2)">原文 ↗</a>`);
  }
  if (meta.length) html += `<div class="item-meta">${meta.join(' · ')}</div>`;

  // Summary or full text
  if (item.text) {
    html += `<div class="item-summary full-text">${esc(item.text)}</div>`;
  } else if (item.summary) {
    html += `<div class="item-summary">${esc(item.summary)}</div>`;
  }

  html += '</div></div>';
  return html;
}

function renderPlatform(key, data) {
  const p = PLATFORMS[key];
  let content = '';

  // wechat has sections
  if (data.sections) {
    for (const sec of data.sections) {
      content += `<div class="section-title">${esc(sec.title)}</div>`;
      for (const item of sec.items) content += renderItem(item, key);
    }
  }

  // items (xhs, bili, yt)
  if (data.items) {
    for (const item of data.items) content += renderItem(item, key);
  }

  // tracked channels (yt)
  if (data.tracked && data.tracked.length) {
    content += '<div class="section-title">跟踪频道动态</div>';
    for (const item of data.tracked) content += renderItem(item, key);
  }

  // trends
  if (data.trends) {
    content += `<div class="trends">${data.trends}</div>`;
  }

  if (!content) return '';

  let html = '<div class="platform-group collapsed">';
  const count = (data.items?.length || 0) + (data.sections?.reduce((n,s) => n + s.items.length, 0) || 0) + (data.tracked?.length || 0);
  html += `<div class="platform-header" onclick="togglePlatform(this)">`;
  html += `<span class="arrow">▾</span>`;
  html += `<span class="entry-platform ${p.cls}">${p.label}</span>`;
  html += `<span style="color:var(--text2);font-size:12px;margin-left:auto">${count} 条</span>`;
  html += '</div>';
  html += `<div class="platform-content">${content}</div>`;
  html += '</div>';
  return html;
}

function render() {
  const el = document.getElementById('timeline');
  const dates = Object.keys(DATA).sort((a,b) => b.localeCompare(a));
  let html = '';
  let dayIdx = 0;

  for (const dateStr of dates) {
    const dayData = DATA[dateStr];
    const d = new Date(dateStr + 'T00:00:00');
    const weekday = WEEKDAYS[d.getDay()];

    // Filter platforms
    const keys = filter === 'all'
      ? Object.keys(PLATFORMS).filter(k => dayData[k])
      : (dayData[filter] ? [filter] : []);
    if (!keys.length) continue;

    const collapsed = dayIdx === 0 ? '' : ' collapsed';
    dayIdx++;
    let totalItems = 0;
    let platformsHtml = '';
    for (const k of keys) {
      const ph = renderPlatform(k, dayData[k]);
      if (ph) {
        platformsHtml += ph;
        const dd = dayData[k];
        totalItems += (dd.items?.length || 0) + (dd.sections?.reduce((n,s) => n + s.items.length, 0) || 0) + (dd.tracked?.length || 0);
      }
    }
    if (!platformsHtml) continue;

    html += `<div class="date-node${collapsed}">`;
    html += `<div class="date-label" onclick="toggleDay(this)">`;
    html += `<span class="arrow">▾</span>${dateStr}<span class="weekday">${weekday}</span>`;
    html += `<span class="entry-count">${totalItems} 条</span>`;
    html += '</div>';
    html += platformsHtml;
    html += '</div>';
  }

  if (!html) {
    html = '<div class="empty-state"><div class="icon">📱</div><p>暂无内容</p></div>';
  }
  el.innerHTML = html;
}

render();
