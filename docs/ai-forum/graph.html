<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>讨论依赖图</title>
<style>
:root, body.theme-claude {
  --bg: #FAF9F5; --card: #fff; --border: #E8E5DE;
  --text: #3D3929; --text2: #8C8575; --accent: #D97757; --accent-light: #F4DDD3;
}
body.theme-warm {
  --bg: #F5EDD6; --card: #FAF6EB; --border: #D4C9AD;
  --text: #4A4235; --text2: #7A6E5A; --accent: #B8860B; --accent-light: #F5E6C0;
}
body.theme-dark {
  --bg: #1E1E1E; --card: #252525; --border: #333;
  --text: #D4D4D4; --text2: #909090; --accent: #D97757; --accent-light: #3A2A22;
}
body.theme-solarized {
  --bg: #FDF6E3; --card: #EEE8D5; --border: #D3CBB8;
  --text: #657B83; --text2: #93A1A1; --accent: #CB4B16; --accent-light: #FCE4D6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Söhne', -apple-system, sans-serif; background: var(--bg); color: var(--text); }

.header {
  padding: 16px 28px; background: var(--card); border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header-right { display: flex; gap: 12px; align-items: center; }
.topic-select {
  padding: 5px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 12px; background: var(--card);
}
.back-link { font-size: 12px; color: var(--accent); text-decoration: none; }
.back-link:hover { text-decoration: underline; }

.main-layout {
  display: flex; height: calc(100vh - 56px);
}
.graph-container {
  flex: 1; overflow: auto; position: relative;
}
.col-header-sticky {
  position: sticky; top: 0; z-index: 10;
  height: 32px; background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
}
.detail-panel {
  width: 0; min-width: 0; background: var(--card); border-left: 1px solid var(--border);
  overflow-y: auto; padding: 0; display: flex; flex-direction: column;
  transition: width 0.2s, min-width 0.2s;
}
.detail-panel.open {
  width: 320px; min-width: 320px;
}
.detail-panel .empty-hint {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-size: 13px; padding: 20px;
}
.detail-panel .dp-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
}
.detail-panel .dp-author {
  display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 11px; font-weight: 600;
  margin-bottom: 8px;
}
.detail-panel .dp-title {
  font-size: 15px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; color: var(--text);
  padding: 0 18px;
}
.detail-panel .dp-meta {
  font-size: 11px; color: var(--text2); padding: 0 18px; margin-bottom: 12px;
}
.detail-panel .dp-content {
  font-size: 12px; line-height: 1.7; color: var(--text); padding: 0 18px 16px;
  white-space: pre-wrap; word-break: break-word;
  max-height: 300px; overflow-y: auto;
}
.detail-panel .dp-replies {
  border-top: 1px solid var(--border); padding: 12px 18px;
}
.detail-panel .dp-replies-title {
  font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 10px;
}
.detail-panel .dp-reply {
  padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 11px;
}
.detail-panel .dp-reply:last-child { border-bottom: none; }
.detail-panel .dp-reply-author {
  display: inline-block; padding: 1px 6px; border-radius: 6px; font-size: 10px; font-weight: 600; margin-bottom: 4px;
}
.detail-panel .dp-reply-text {
  color: var(--text); line-height: 1.6; max-height: 80px; overflow: hidden;
}
.detail-panel .dp-link {
  display: block; padding: 10px 18px; border-top: 1px solid var(--border);
  text-align: center; font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 600;
}
.detail-panel .dp-link:hover { background: var(--accent-light); }

svg { display: block; }

/* 轮次标签 */
.round-label {
  font-size: 11px; font-weight: 700; fill: var(--accent);
}
.round-line { stroke: var(--border); stroke-width: 1; stroke-dasharray: 4,4; }

/* 节点 */
.node { cursor: pointer; transition: opacity 0.15s; }
.node:hover { opacity: 0.85; }
.node rect { rx: 8; ry: 8; stroke-width: 1.5; transition: stroke-width 0.15s, filter 0.15s; }
.node.focused rect { stroke-width: 3; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15)); }
.node text { font-size: 10px; font-family: inherit; }
.node .title-text { font-weight: 600; font-size: 9px; }
.node .author-text { font-size: 9px; opacity: 0.7; }

/* 边 */
.edge { fill: none; stroke-width: 1.5; opacity: 0.4; }
.edge:hover { opacity: 0.8; stroke-width: 2.5; }
.edge.reply { stroke: #B0A090; }
.edge.highlight { opacity: 0.9; stroke-width: 3; }

/* 图例 */
.legend {
  position: fixed; bottom: 16px; left: 16px; background: var(--card);
  border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px;
  font-size: 11px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: all 0.2s;
}
.legend.collapsed { padding: 6px 12px; }
.legend.collapsed .legend-body { display: none; }
.legend-toggle {
  cursor: pointer; font-size: 10px; color: var(--text2); float: right;
  margin-left: 12px;
}
.legend-toggle:hover { color: var(--accent); }
.legend-item { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
.legend-dot { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }

</style>
</head>
<body>

<div class="header">
  <h1>讨论依赖图</h1>
  <div class="header-right">
    <div class="theme-btns" style="display:flex;gap:2px;margin-right:8px">
      <button onclick="setTheme('theme-claude')" data-theme="theme-claude" title="Claude 默认" style="width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid var(--border);padding:0;background:#FAF9F5"></button>
      <button onclick="setTheme('theme-warm')" data-theme="theme-warm" title="护眼暖光" style="width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid var(--border);padding:0;background:#F5EDD6"></button>
      <button onclick="setTheme('theme-dark')" data-theme="theme-dark" title="深色护眼" style="width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid var(--border);padding:0;background:#1E1E1E"></button>
      <button onclick="setTheme('theme-solarized')" data-theme="theme-solarized" title="Solarized" style="width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid var(--border);padding:0;background:#FDF6E3"></button>
    </div>
    <select class="topic-select" id="topic-select" onchange="load(this.value)"></select>
    <a class="back-link" href="index.html">返回论坛</a>
  </div>
</div>

<div class="main-layout">
  <div class="graph-container" id="graph-container">
    <div class="col-header-sticky" id="col-header"></div>
    <svg id="graph" style="margin-top:32px"></svg>
  </div>
  <div class="detail-panel" id="detail-panel">
  </div>
</div>

<script>
// ── Theme ──
function setTheme(t) {
  document.body.classList.remove('theme-claude','theme-warm','theme-dark','theme-solarized');
  document.body.classList.add(t);
  document.querySelectorAll('.theme-btns button').forEach(b => {
    b.style.borderColor = b.dataset.theme === t ? 'var(--accent)' : '';
    b.style.boxShadow = b.dataset.theme === t ? '0 0 0 2px var(--accent-light)' : '';
  });
  localStorage.setItem('forum-theme', t);
}
setTheme(localStorage.getItem('forum-theme') || 'theme-claude');

const AGENT_COLORS = {
  '原始材料': '#D97757',
  '估值分析': '#6B4FA0', '财报分析': '#6B4FA0',
  '行业动态': '#2D6E31',
  '市场情绪': '#B85C38',
  '技术分析': '#3B6B8A',
  '宏观分析': '#2A6B60', '宏观环境': '#2A6B60',
  '机构观点': '#9B3A44',
  'AI趋势预测': '#5B3FA0', 'AI情景推演': '#5B3FA0',
  '批判者': '#A0452A',
  '汇总者': '#1A7070',
  '世界模型': '#5A5548',
  '组合构建': '#4A7B3A',
  '风险量化': '#3B6B8A',
  '历史类比': '#7B5B2A',
  '代码验证': '#8B4513',
  '用户': '#2D5A2D',
};
const DEFAULT_COLOR = '#8C8575';

function getColor(author) { return AGENT_COLORS[author] || DEFAULT_COLOR; }
function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + amt); g = Math.min(255, g + amt); b = Math.min(255, b + amt);
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

async function init() {
  const r = await fetch('topics.json?' + Date.now());
  const topics = await r.json();
  const sel = document.getElementById('topic-select');
  topics.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id; opt.textContent = t.name;
    sel.appendChild(opt);
  });
  // 从 URL hash 恢复 topic
  const params = new URLSearchParams(location.hash.substring(1));
  const saved = params.get('t');
  if (saved && topics.find(t => t.id === saved)) {
    sel.value = saved; load(saved);
  } else if (topics.length) {
    sel.value = topics[0].id; load(topics[0].id);
  }
}

async function load(topicId) {
  history.replaceState(null, '', location.pathname + '#t=' + topicId);
  let posts = [], logs = [];
  try {
    posts = await (await fetch('topics/' + topicId + '/forum/posts.json?' + Date.now())).json();
  } catch(e) {}
  try {
    logs = await (await fetch('topics/' + topicId + '/world/log.json?' + Date.now())).json();
  } catch(e) {}
  render(posts, logs);
}

function assignRounds(posts, logs) {
  // 从 log 提取每轮的时间范围
  const roundBounds = [];
  for (let i = 0; i < logs.length; i++) {
    const log = logs[i];
    roundBounds.push({ round: log.round, time: log.time });
  }

  // 给每个帖子分配轮次
  return posts.map(p => {
    // 种子帖 = R0
    if (p.is_seed) return { ...p, round: 0 };

    // 从标题提取轮次
    const titleMatch = p.title && p.title.match(/[第RrⅠ][\s]*(\d+)/);
    if (titleMatch) return { ...p, round: parseInt(titleMatch[1]) };

    // 按时间匹配
    let bestRound = 1;
    for (const b of roundBounds) {
      if (p.time <= b.time) { bestRound = b.round; break; }
      bestRound = b.round;
    }
    return { ...p, round: bestRound };
  });
}

function render(posts, logs) {
  const enriched = assignRounds(posts, logs);

  // 按轮次分组
  const rounds = {};
  enriched.forEach(p => {
    const r = p.round || 0;
    if (!rounds[r]) rounds[r] = [];
    rounds[r].push(p);
  });

  const roundNums = Object.keys(rounds).map(Number).sort((a, b) => a - b);

  // 获取所有 agent（只取有主帖的，保持列稳定）
  const agentSet = new Set(enriched.filter(p => !p.parent_id).map(p => p.author));
  // 把有回复但没主帖的 author 也加进来
  enriched.filter(p => p.parent_id).forEach(p => agentSet.add(p.author));
  const agentList = Array.from(agentSet);

  // 布局参数
  const NODE_W = 160, NODE_H = 52, PAD_X = 24, PAD_Y = 60;
  const LEFT_MARGIN = 60;

  // 先计算每轮每 agent 的主帖数量，确定每轮高度
  const roundLayout = {};
  roundNums.forEach((rn, ri) => {
    const postsInRound = rounds[rn] || [];
    const byAgent = {};
    postsInRound.forEach(p => {
      if (!byAgent[p.author]) byAgent[p.author] = { posts: [], replies: [] };
      if (p.parent_id) byAgent[p.author].replies.push(p);
      else byAgent[p.author].posts.push(p);
    });
    // 这一轮最多有几个主帖在同一个 agent 列
    let maxPostsInCol = 1;
    Object.values(byAgent).forEach(v => { maxPostsInCol = Math.max(maxPostsInCol, v.posts.length); });
    roundLayout[rn] = { byAgent, maxPosts: maxPostsInCol, height: maxPostsInCol * (NODE_H + 16) + PAD_Y };
  });

  // 计算每轮的 y 起始位置
  const roundY = {};
  let curY = 50;
  roundNums.forEach(rn => {
    roundY[rn] = curY;
    curY += roundLayout[rn].height;
  });

  const svgW = LEFT_MARGIN + agentList.length * (NODE_W + PAD_X) + 100;
  const svgH = curY + 40;

  // 给主帖分配位置，回复不单独画节点
  const nodePos = {};
  const replyGroups = {}; // postId -> [replies]

  // 预计算每个主帖收到的回复
  enriched.forEach(p => {
    if (p.parent_id) {
      if (!replyGroups[p.parent_id]) replyGroups[p.parent_id] = [];
      replyGroups[p.parent_id].push(p);
    }
  });

  roundNums.forEach(rn => {
    const y = roundY[rn];
    const layout = roundLayout[rn];

    Object.entries(layout.byAgent).forEach(([author, data]) => {
      const agentIdx = agentList.indexOf(author);
      const baseX = LEFT_MARGIN + agentIdx * (NODE_W + PAD_X);
      // 只布局主帖
      data.posts.forEach((p, pi) => {
        nodePos[p.id] = { x: baseX, y: y + pi * (NODE_H + 16), w: NODE_W, h: NODE_H };
      });
    });
  });

  // 生成 SVG
  const svg = document.getElementById('graph');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);

  let svgContent = '<defs>'
    + '<marker id="arrow" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">'
    + '<path d="M0,0 L6,2 L0,4" fill="#B0A090" opacity="0.6"/>'
    + '</marker></defs>';

  // Agent 列头（用 HTML overlay 实现 sticky）
  const colHeader = document.getElementById('col-header');
  if (colHeader) {
    colHeader.innerHTML = agentList.map((a, i) => {
      const x = LEFT_MARGIN + i * (NODE_W + PAD_X) + NODE_W / 2;
      const color = getColor(a);
      return '<div style="position:absolute;left:' + x + 'px;transform:translateX(-50%);color:' + color + ';font-size:11px;font-weight:600;white-space:nowrap">' + esc(a) + '</div>';
    }).join('');
    colHeader.style.width = svgW + 'px';
  }

  // 轮次背景线和标签
  roundNums.forEach(rn => {
    const y = roundY[rn];
    svgContent += '<line class="round-line" x1="0" y1="' + (y - 8) + '" x2="' + svgW + '" y2="' + (y - 8) + '"/>';
    svgContent += '<text class="round-label" x="8" y="' + (y + 12) + '">R' + rn + '</text>';
  });

  const topicId = document.getElementById('topic-select').value;

  // 收集每个节点的出边和入边，分配锚点
  const outEdges = {}; // nodeId -> [{targetId, color, replyId}]
  const inEdges = {};  // nodeId -> [{sourceId, color, replyId}]

  enriched.forEach(p => {
    if (!p.parent_id || !nodePos[p.parent_id]) return;
    const authorPosts = enriched.filter(x => !x.parent_id && x.author === p.author && x.round === p.round);
    const fromPost = authorPosts[0];
    if (!fromPost || !nodePos[fromPost.id]) return;

    const edge = { from: fromPost.id, to: p.parent_id, color: getColor(p.author), replyId: p.id };
    if (!outEdges[fromPost.id]) outEdges[fromPost.id] = [];
    if (!inEdges[p.parent_id]) inEdges[p.parent_id] = [];
    outEdges[fromPost.id].push(edge);
    inEdges[p.parent_id].push(edge);
  });

  // 为每个节点的出边/入边分配锚点位置（沿底部/顶部均匀分布）
  function getAnchors(nodeId, edges, side) {
    const pos = nodePos[nodeId];
    if (!pos || !edges || !edges.length) return {};
    const count = edges.length;
    const margin = 20; // 左右留白
    const usable = pos.w - margin * 2;
    const anchors = {};
    edges.forEach((e, i) => {
      const x = pos.x + margin + (count === 1 ? usable / 2 : (usable * i / (count - 1)));
      const y = side === 'bottom' ? pos.y + pos.h : pos.y;
      anchors[e.replyId] = { x, y };
    });
    return anchors;
  }

  // 计算所有锚点
  const outAnchors = {};
  const inAnchors = {};
  Object.entries(outEdges).forEach(([nodeId, edges]) => {
    const a = getAnchors(nodeId, edges, 'bottom');
    Object.assign(outAnchors, a);
  });
  Object.entries(inEdges).forEach(([nodeId, edges]) => {
    const a = getAnchors(nodeId, edges, 'top');
    Object.assign(inAnchors, a);
  });

  // 画边
  enriched.forEach(p => {
    if (!p.parent_id || !nodePos[p.parent_id]) return;
    const fromAnchor = outAnchors[p.id];
    const toAnchor = inAnchors[p.id];
    if (!fromAnchor || !toAnchor) return;

    const x1 = fromAnchor.x, y1 = fromAnchor.y;
    const x2 = toAnchor.x, y2 = toAnchor.y;
    const midY = (y1 + y2) / 2;
    const color = getColor(p.author);

    const authorPosts = enriched.filter(x => !x.parent_id && x.author === p.author && x.round === p.round);
    const fromPost = authorPosts[0];

    svgContent += '<path class="edge reply" d="M' + x1 + ',' + y1 + ' C' + x1 + ',' + midY + ' ' + x2 + ',' + midY + ' ' + x2 + ',' + y2 + '"'
      + ' stroke="' + color + '" marker-end="url(#arrow)"'
      + ' data-from="' + (fromPost ? fromPost.id.substring(0,8) : '') + '" data-to="' + p.parent_id.substring(0,8) + '"/>';
  });

  // 用户回复单独画节点——放在被回复帖子所在轮次，用户列位置
  const userIdx = agentList.indexOf('用户');
  const userX = userIdx >= 0 ? LEFT_MARGIN + userIdx * (NODE_W + PAD_X) : svgW - NODE_W - 40;
  let userSlotY = {}; // 每轮 user 的 y offset

  enriched.forEach(p => {
    if (p.author !== '用户' || !p.parent_id) return;
    if (!nodePos[p.parent_id]) return;
    const parentPos = nodePos[p.parent_id];
    // 找所属轮次的 y
    const parentRound = enriched.find(x => x.id === p.parent_id);
    const rn = parentRound ? parentRound.round : 0;
    const baseY = roundY[rn] || parentPos.y;
    if (!userSlotY[rn]) userSlotY[rn] = 0;
    const y = baseY + userSlotY[rn] * (NODE_H + 16);
    userSlotY[rn]++;
    nodePos[p.id] = { x: userX, y, w: NODE_W, h: NODE_H };
  });

  // 用户回复的连线
  enriched.forEach(p => {
    if (p.author !== '用户' || !p.parent_id) return;
    if (!nodePos[p.id] || !nodePos[p.parent_id]) return;
    const from = nodePos[p.id];
    const to = nodePos[p.parent_id];
    const x1 = from.x, y1 = from.y + from.h / 2;
    const x2 = to.x + to.w, y2 = to.y + to.h / 2;
    svgContent += '<path class="edge reply" d="M' + x1 + ',' + y1 + ' L' + x2 + ',' + y2 + '"'
      + ' stroke="#2D5A2D" stroke-dasharray="6,3" marker-end="url(#arrow)"'
      + ' data-from="' + p.id.substring(0,8) + '" data-to="' + p.parent_id.substring(0,8) + '"/>';
  });

  // 节点（主帖 + 用户回复）
  enriched.forEach(p => {
    if (p.parent_id && p.author !== '用户') return; // 跳过非用户回复
    if (!nodePos[p.id]) return;
    const pos = nodePos[p.id];
    const color = getColor(p.author);
    const bg = lighten(color, 180);
    const title = (p.title || '').substring(0, 20);
    const replyCount = (replyGroups[p.id] || []).length;
    // 回复者列表
    const repliers = [...new Set((replyGroups[p.id] || []).map(r => r.author))];

    svgContent += '<g class="node" data-id="' + p.id + '" transform="translate(' + pos.x + ',' + pos.y + ')"'
      + ' onclick="selectNode(\'' + p.id + '\')">';
    const isUserReply = p.author === '用户' && p.parent_id;
    svgContent += '<rect width="' + pos.w + '" height="' + pos.h + '" fill="' + bg + '" stroke="' + color + '"'
      + (isUserReply ? ' stroke-dasharray="6,3" stroke-width="2"' : '') + '/>';
    // 用户回复没标题时显示内容前20字
    const displayTitle = title || (p.content || '').replace(/\n/g, ' ').substring(0, 22);
    svgContent += '<text class="title-text" x="8" y="16" fill="' + color + '">' + esc(displayTitle) + '</text>';

    // 第二行：回复 badge
    if (replyCount > 0) {
      // 回复者头像点
      let dotX = 8;
      repliers.slice(0, 5).forEach(r => {
        const rc = getColor(r);
        svgContent += '<circle cx="' + (dotX + 4) + '" cy="32" r="4" fill="' + rc + '" opacity="0.8"/>';
        dotX += 10;
      });
      if (repliers.length > 5) {
        svgContent += '<text x="' + (dotX + 2) + '" y="35" style="font-size:8px" fill="' + color + '" opacity="0.5">+' + (repliers.length - 5) + '</text>';
        dotX += 14;
      }
      // 回复计数
      svgContent += '<text x="' + (pos.w - 8) + '" y="35" text-anchor="end" style="font-size:10px;font-weight:600" fill="' + color + '">' + replyCount + ' 回复</text>';
    } else {
      svgContent += '<text x="8" y="35" style="font-size:9px" fill="' + color + '" opacity="0.3">无回复</text>';
    }
    svgContent += '</g>';
  });

  svg.innerHTML = svgContent;


  // 存储 posts 给 tooltip 用
  window._graphPosts = {};
  enriched.forEach(p => window._graphPosts[p.id] = p);
}

let selectedNodeId = null;

function selectNode(postId) {
  const p = window._graphPosts[postId];
  if (!p) return;
  selectedNodeId = postId;

  // 高亮节点
  document.querySelectorAll('.node').forEach(n => n.classList.remove('focused'));
  const node = document.querySelector('.node[data-id="' + postId + '"]');
  if (node) node.classList.add('focused');

  // 高亮相关边
  document.querySelectorAll('.edge').forEach(edge => {
    const from = edge.getAttribute('data-from');
    const to = edge.getAttribute('data-to');
    const short = postId.substring(0, 8);
    edge.classList.toggle('highlight', from === short || to === short);
  });

  // 渲染右侧详情
  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  const replies = Object.values(window._graphPosts).filter(r => r.parent_id === postId);
  const color = getColor(p.author);
  const bg = lighten(color, 180);
  const topicId = document.getElementById('topic-select').value;

  let html = '<div class="dp-header">帖子详情</div>';
  html += '<div style="padding:14px 18px 0">';
  html += '<span class="dp-author" style="background:' + bg + ';color:' + color + '">' + esc(p.author) + '</span>';
  html += '</div>';
  html += '<div class="dp-title">' + esc(p.title || '(无标题)') + '</div>';
  html += '<div class="dp-meta">R' + p.round + ' · ' + p.time + '</div>';
  html += '<div class="dp-content">' + esc(p.content || '') + '</div>';

  if (replies.length) {
    html += '<div class="dp-replies">';
    html += '<div class="dp-replies-title">' + replies.length + ' 条回复</div>';
    replies.forEach(r => {
      const rc = getColor(r.author);
      const rbg = lighten(rc, 180);
      html += '<div class="dp-reply">';
      html += '<span class="dp-reply-author" style="background:' + rbg + ';color:' + rc + '">' + esc(r.author) + '</span>';
      html += ' <span style="font-size:10px;color:var(--text2)">' + r.time + '</span>';
      html += '<div class="dp-reply-text">' + esc((r.content || '').substring(0, 200)) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '<a class="dp-link" href="index.html#t=' + topicId + '&p=' + postId.substring(0,8) + '" target="_blank">在论坛中打开 &rarr;</a>';
  panel.innerHTML = html;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// 点击空白取消选中
document.getElementById('graph-container').addEventListener('click', function(e) {
  if (!e.target.closest('.node')) {
    selectedNodeId = null;
    document.querySelectorAll('.node.focused').forEach(n => n.classList.remove('focused'));
    document.querySelectorAll('.edge.highlight').forEach(e => e.classList.remove('highlight'));
    const panel = document.getElementById('detail-panel');
    panel.classList.remove('open');
    panel.innerHTML = '';
  }
});

// 列头随横向滚动同步
document.getElementById('graph-container').addEventListener('scroll', function() {
  const header = document.getElementById('col-header');
  if (header) header.style.transform = 'translateX(0)';
});

function toggleLegend() {
  const legend = document.getElementById('legend');
  const collapsed = legend.classList.toggle('collapsed');
  legend.querySelector('.legend-toggle').textContent = collapsed ? '展开' : '收起';
}

init();
</script>
</body>
</html>
